# GitLab CI — the TestSprite verification loop, wired into CI.
#
# Runs on GitLab's shared runners (free tier). Used because this account's
# GitHub Actions are gated by a billing lock; GitLab CI is unaffected. The repo
# is imported/mirrored from https://github.com/lxcario/Nora.
#
# Two layers, both verified green locally:
#   1. Unit suite (Vitest — 394 tests).
#   2. The TestSprite checker: reruns the FULL banked suite (61 tests) against
#      the live Vercel deployment. Backend tests (7) hit the REST/RLS layer and
#      are drift-immune. Frontend tests (50) replay saved scripts for free —
#      auto-heal fires only when the UI has actually drifted.
#
# Why --all instead of a subset:
#   Frontend verbatim replays are free (no credit charge). If the UI hasn't
#   changed, they pass instantly. If it has, auto-heal engages and either fixes
#   the script or reports a genuine regression. Either way, the build knows.
#
# Setup (one-time, in GitLab): Project → Settings → CI/CD → Variables → add
#   TESTSPRITE_API_KEY  (masked)  = <your key from .env.local>
# The CLI reads it via `testsprite setup --from-env`.

stages:
  - verify

verify:
  stage: verify
  image: node:20-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm test
    - npm install -g @testsprite/testsprite-cli
    - testsprite setup --from-env --yes --no-agent
    # Rerun the full banked suite against the live app.
    # Backend tests (7) hit the Supabase REST/RLS layer — drift-immune, ~0 credits.
    # Frontend tests (50) replay saved scripts — free verbatim replays, auto-heal
    # engages only if the UI drifted (small credit, rare after stabilization).
    # This gates the build on the entire TestSprite suite, not just a subset.
    - >
      testsprite test rerun
      --all
      --project 4ba5d8f8-310d-41bc-bbf4-b85208bb6d44
      --wait --timeout 900 --max-concurrency 4 --output json
