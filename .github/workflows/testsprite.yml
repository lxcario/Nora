# TestSprite verification workflow.
#
# This reruns the banked suite against the live app with the same command used
# throughout the build (`testsprite test rerun --all`). It is intentionally
# `workflow_dispatch` (manual) only: this account's GitHub Actions are currently
# gated by a billing lock, so a `push:` trigger would produce jobs that never
# start. Rather than emit misleading check results, the loop was driven directly
# via the CLI (see LOOP.md). Re-enable the `push:` trigger below once Actions are
# available on the account.
name: TestSprite Verification Loop

on:
  workflow_dispatch:
  # push:
  #   branches: [master]

jobs:
  testsprite:
    name: Rerun TestSprite suite
    runs-on: ubuntu-latest

    steps:
      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Configure credentials
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          TESTSPRITE_API_KEY="${TESTSPRITE_API_KEY}" testsprite setup --from-env --yes --no-agent

      - name: Rerun full test suite against live app
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          TESTSPRITE_API_KEY="${TESTSPRITE_API_KEY}" testsprite test rerun \
            --all \
            --project 4ba5d8f8-310d-41bc-bbf4-b85208bb6d44 \
            --target-url https://norastudy.vercel.app \
            --wait \
            --timeout 600 \
            --output json
