# Cirrus CI — continuous verification of the codebase on every push.
#
# Runs on Cirrus's own infra (free for public repos), independent of GitHub
# Actions — so it works even though this account's GitHub Actions are gated by a
# billing lock. It runs the deterministic checks that gate the build:
#   * the full unit suite (Vitest — 332 tests, property-based)
#   * a strict-mode production build (next build runs the TypeScript check)
#
# It intentionally does NOT rerun the banked TestSprite browser suite here:
# frontend reruns replay saved scripts, which drift as the live UI evolves and
# would turn CI red on drift rather than on a real regression. The TestSprite
# loop is driven via the CLI (see LOOP.md); the workflow committed under
# .github/workflows/testsprite.yml holds the `testsprite test rerun --all`
# command for when GitHub Actions are available on the account.
#
# Setup (one-time, in the Cirrus dashboard): install the Cirrus GitHub App on
# lxcario/Nora at https://cirrus-ci.org. No secrets required for this job.

task:
  name: Verify (unit tests + strict build)
  only_if: $CIRRUS_BRANCH == 'master'
  container:
    image: node:20-slim
  node_modules_cache:
    folder: node_modules
    fingerprint_script: cat package-lock.json
    populate_script: npm ci
  test_script:
    - npm test
  build_script:
    - npm run build
