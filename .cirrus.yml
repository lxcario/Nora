# Cirrus CI — verification on every master push.
#
# Runs on Cirrus's own infra (free for public repos), independent of GitHub
# Actions, so it works even though this account's GitHub Actions are gated by a
# billing lock. Two layers, both verified green:
#
#   1. Unit suite (Vitest — 332 tests) + strict TypeScript via the build.
#   2. The TestSprite checker itself: reruns the 3 BACKEND tests
#      (schema + RLS data isolation + RLS reward-manipulation). These hit the
#      REST/RLS layer, so they are drift-immune (no UI to drift) and rerun at
#      ~0 credits — unlike the browser suite, whose saved scripts drift as the
#      live UI evolves. The browser loop is driven via the CLI (see LOOP.md).
#
# One-time setup in the Cirrus dashboard (https://cirrus-ci.org):
#   1. Install the Cirrus CI GitHub App on lxcario/Nora.
#   2. Repository Settings -> add a SECURED env var:
#        TESTSPRITE_API_KEY = <your key from .env.local>
#      (the CLI reads it via `testsprite setup --from-env`).

task:
  name: Verify (unit tests + TestSprite backend checker)
  only_if: $CIRRUS_BRANCH == 'master'
  container:
    image: node:20-slim
  node_modules_cache:
    folder: node_modules
    fingerprint_script: cat package-lock.json
    populate_script: npm ci
  unit_tests_script:
    - npm test
  install_cli_script:
    - npm install -g @testsprite/testsprite-cli
  testsprite_backend_checker_script:
    - testsprite setup --from-env --yes --no-agent
    - >
      testsprite test rerun
      43943ea6-daa9-4a9e-a18d-59d8abacc33e
      36c43c1e-258b-482a-97be-a135b8107e5a
      23d76c46-f900-455f-85c5-cdafe379949d
      --wait --timeout 600 --output json
